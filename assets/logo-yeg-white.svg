<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 70" width="280" height="70">
  <!-- Flame/snowflake shield background -->
  <rect x="0" y="5" width="60" height="60" rx="8" ry="8" fill="#E65C00"/>
  <!-- YEG text inside shield -->
  <text x="30" y="44" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#FFFFFF" text-anchor="middle">YEG</text>
  <!-- Flame accent dot -->
  <circle cx="52" cy="14" r="5" fill="#FFFFFF"/>
  <!-- Company name -->
  <text x="72" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">YEG Heating</text>
  <text x="72" y="44" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">&amp; Cooling</text>
  <text x="72" y="63" font-family="Arial, sans-serif" font-size="9.5" font-weight="500" fill="#CBD5E1">Edmonton HVAC Specialists</text>
</svg>
